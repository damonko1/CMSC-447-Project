<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Dashboard</title>
    <link rel="stylesheet" href="main_page.css">
    <script type="module" src="main_page.js"></script>
</head>

<body>
    <div class="top-bar">
        <div class="day-selector">
            <button id="prevBtn">◀</button>
            <span id="dayDisplay"></span>
            <button id="nextBtn">▶</button>
        </div>
        <div id = "dateBtn">
                <span id = "dateTxt"></span>
                <div id="calendarPopup" class="hidden">
                    <input type="date" id="calendarInput"> <!--utilizing native date picker browser component; "input type = "date"-->
                </div>
        </div>
        <div class="right-section">
            <img src="UMBCretrievers_JUSTHEAD-on-white-or-black.png" alt="logo" class="logo">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search tutors...">
            </div>
            <button id="logoutBtn" class="logout-btn" type="button">Log Out</button>
        </div>
    </div>

    <div id="scheduleContainer" class="schedule-container"></div>

    <dialog id="persistenceDialog" class="persistence-dialog">
        <form id="persistenceForm" class="persistence-form" method="dialog">
            <h2>Status Duration</h2>
            <p id="persistenceDescription" class="persistence-description"></p>

            <fieldset class="persistence-options">
                <label>
                    <input type="radio" name="durationMode" value="single" checked>
                    Apply only to this day
                </label>

                <label>
                    <input type="radio" name="durationMode" value="multi">
                    Keep this status for multiple days
                </label>
            </fieldset>

            <label class="persistence-date-field" for="persistUntilInput">
                Through date
                <input type="date" id="persistUntilInput" name="persistUntil">
            </label>

            <p class="persistence-help">
                Multi-day changes will apply to this tutor's scheduled sessions through the selected date.
            </p>

            <div class="persistence-actions">
                <button type="button" id="persistenceCancelBtn" class="secondary-btn">Cancel</button>
                <button type="submit" id="persistenceSaveBtn" class="primary-btn">Save</button>
            </div>
        </form>
    </dialog>
</body>
</html>
